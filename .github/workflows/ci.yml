name: Scraper CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_scraper:
        description: "Uruchomic pelny scraper (wymaga secret GOOGLE_API_KEY)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

  run-scraper:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_scraper == 'true' }}
    runs-on: ubuntu-latest
    needs: tests
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GEMINI_MODEL: gemini-1.5-flash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate API key
        run: |
          if [ -z "${GOOGLE_API_KEY}" ]; then
            echo "Brak secretu GOOGLE_API_KEY. Dodaj go w Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Run scraper
        run: python scraper.py
