name: Scraper CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_scraper:
        description: "Uruchomic pelny scraper (wymaga secret GOOGLE_API_KEY)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

  run-scraper:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_scraper == 'true' }}
    runs-on: ubuntu-latest
    needs: tests
    env:
      GEMINI_MODEL: gemini-1.5-flash
      GOOGLE_DRIVE_FOLDER_ID: 1r9skaSfhfJ13xzkS8wIOkCKCRfY6VDd9
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate API key
        run: |
          API_KEY="${{ secrets.GOOGLE_API_KEY }}"
          if [ -z "${API_KEY}" ]; then
            API_KEY="${{ secrets.GEMINI_API_KEY }}"
          fi
          if [ -z "${API_KEY}" ]; then
            echo "Brak secretu GOOGLE_API_KEY lub GEMINI_API_KEY. Dodaj go w Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "GOOGLE_API_KEY=${API_KEY}" >> "$GITHUB_ENV"

      - name: Validate Drive credentials
        run: |
          if [ -z "${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "Brak secretu GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON."
            echo "Dodaj JSON konta serwisowego w Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Run scraper
        run: python scraper.py

      - name: Write Drive service account file
        run: |
          cat > gdrive-service-account.json <<'EOF'
          ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Upload CSV to Google Drive folder
        env:
          GOOGLE_APPLICATION_CREDENTIALS: gdrive-service-account.json
        run: python upload_csv_to_drive.py
